[build]
builder = "NIXPACKS"

[build.nixpacksPlan]
providers = ["node"]

[deploy]
startCommand = "cd backend && npx prisma generate && npx prisma migrate deploy && node src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
